<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Luau Academy | منصة تعلم روبلوكس</title>
    <style>
        :root { --blue: #3b82f6; --dark: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: var(--text); display: flex; margin: 0; }

        /* القائمة الجانبية */
        .sidebar { width: 250px; background: var(--card); height: 100vh; padding: 20px; border-left: 2px solid #334155; }
        .nav-item { padding: 15px; margin: 5px 0; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .nav-item:hover { background: var(--blue); }

        /* منطقة المحتوى */
        .content { flex-grow: 1; padding: 40px; }
        .progress-container { width: 100%; height: 10px; background: #334155; border-radius: 5px; margin-bottom: 20px; }
        #progress-bar { width: 25%; height: 100%; background: var(--blue); border-radius: 5px; }

        /* الأزرار والأكواد */
        pre { background: #000; padding: 20px; border-radius: 10px; color: #fbbf24; border-right: 4px solid var(--blue); }
        .quiz-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #334155; border: none; color: white; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Luau Academy</h2>
    <div class="nav-item" onclick="loadContent('vars')">1. المتغيرات</div>
    <div class="nav-item" onclick="loadContent('events')">2. الأحداث</div>
</div>

<div class="content">
    <div class="progress-container"><div id="progress-bar"></div></div>
    
    <div id="main-display">
        <h1>مرحباً بك في أكاديمية لواء</h1>
        <p>اختر درساً من القائمة لبدء التعلم.</p>
    </div>
</div>

<script>
    const lessons = {
        vars: {
            title: "المتغيرات (Variables)",
            text: "تستخدم لحفظ القيم. جرب الكود التالي:",
            code: "local speed = 10",
            quiz: { q: "ما هي الكلمة لتعريف متغير؟", a: ["local", "var", "int"], correct: 0 }
        }
    };

    function loadContent(lessonKey) {
        const lesson = lessons[lessonKey];
        document.getElementById('main-display').innerHTML = `
            <h2>${lesson.title}</h2>
            <p>${lesson.text}</p>
            <pre>${lesson.code}</pre>
            <h3>اختبار سريع:</h3>
            ${lesson.quiz.a.map((ans, i) => `<button class="quiz-btn" onclick="check(${i}, ${lesson.quiz.correct})">${ans}</button>`).join('')}
        `;
        document.getElementById('progress-bar').style.width = "50%";
    }

    function check(user, correct) {
        alert(user === correct ? "✅ صح!" : "❌ خطأ!");
    }
</script>

</body>
</html>
