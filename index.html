<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Prime Gateway | المتجر الاحترافي</title>
    <style>
        :root { --bg: #030712; --card: #111827; --accent: #00f2fe; --gold: #d4af37; --text: #f3f4f6; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        .hidden { display: none !important; }
        header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .hero { text-align: center; padding: 100px 20px; }
        .main-container { padding: 50px 10%; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        button { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #admin-panel { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<header>
    <h2>PRIME GATEWAY</h2>
    <div id="user-info">
        <a id="login-btn" href="https://discord.com/oauth2/authorize?client_id=1508592285158473851" style="color:var(--accent)">تسجيل دخول Discord</a>
        <span id="username-display"></span>
    </div>
</header>

<div class="hero">
    <h1>المتجر الرقمي الفاخر</h1>
    <p>أفضل الخدمات بلمسة احترافية</p>
</div>

<main class="main-container">
    <div id="admin-panel" class="hidden">
        <h3>لوحة تحكم المدير (.t7q.)</h3>
        <input id="pName" placeholder="اسم المنتج">
        <input id="pPrice" placeholder="السعر">
        <button onclick="addProd()">إضافة منتج</button>
    </div>

    <div class="product-grid" id="product-list"></div>
</main>

<script>
    const MY_ID = "1123215043224408105";
    let products = JSON.parse(localStorage.getItem('prods')) || [{n: "Discord Nitro", p: "29"}];
    let currentUser = null;

    // استخراج بيانات المستخدم من ديسكورد بعد العودة
    const fragment = new URLSearchParams(window.location.hash.substring(1));
    const token = fragment.get('access_token');

    if (token) {
        fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } })
        .then(res => res.json())
        .then(user => {
            currentUser = user;
            document.getElementById('username-display').innerText = "مرحباً: " + user.username;
            document.getElementById('login-btn').classList.add('hidden');
            
            // التحقق من الصلاحيات
            if (user.id === MY_ID) {
                document.getElementById('admin-panel').classList.remove('hidden');
            }
            render();
        });
    }

    function render() {
        document.getElementById('product-list').innerHTML = products.map((item, i) => `
            <div class="product-card">
                <h3>${item.n}</h3>
                <p>${item.p} ر.س</p>
                <button onclick="alert('تم الطلب!')">شراء</button>
                ${(currentUser && currentUser.id === MY_ID) ? `<button style="background:red; margin-top:5px" onclick="del(${i})">حذف</button>` : ""}
            </div>
        `).join('');
    }

    function addProd() {
        const n = document.getElementById('pName').value;
        const p = document.getElementById('pPrice').value;
        if(n && p) {
            products.push({n, p});
            localStorage.setItem('prods', JSON.stringify(products));
            render();
        }
    }

    function del(i) {
        products.splice(i, 1);
        localStorage.setItem('prods', JSON.stringify(products));
        render();
    }

    render();
</script>
</body>
</html>
